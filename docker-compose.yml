version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vastik_db
      POSTGRES_USER: vastik_user
      POSTGRES_PASSWORD: vastik_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    restart: unless-stopped
    command: gunicorn vastik.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - ./backend:/app
      - ./frontend/static:/app/frontend_static
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://vastik_user:vastik_pass@db:5432/vastik_db
    depends_on:
      - db

volumes:
  postgres_data:
  media_data:
