<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8860A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g transform="translate(100,100)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="88" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4"/>
    <!-- Mandala petals - outer -->
    <g opacity="0.8">
      <ellipse cx="0" cy="-70" rx="18" ry="30" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(0)"/>
      <ellipse cx="0" cy="-70" rx="18" ry="30" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(30)"/>
      <ellipse cx="0" cy="-70" rx="18" ry="30" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(60)"/>
      <ellipse cx="0" cy="-70" rx="18" ry="30" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(90)"/>
      <ellipse cx="0" cy="-70" rx="18" ry="30" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(120)"/>
      <ellipse cx="0" cy="-70" rx="18" ry="30" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(150)"/>
      <ellipse cx="0" cy="-70" rx="18" ry="30" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(180)"/>
      <ellipse cx="0" cy="-70" rx="18" ry="30" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(210)"/>
      <ellipse cx="0" cy="-70" rx="18" ry="30" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(240)"/>
      <ellipse cx="0" cy="-70" rx="18" ry="30" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(270)"/>
      <ellipse cx="0" cy="-70" rx="18" ry="30" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(300)"/>
      <ellipse cx="0" cy="-70" rx="18" ry="30" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(330)"/>
    </g>
    <!-- Inner petals -->
    <g opacity="0.9">
      <ellipse cx="0" cy="-40" rx="12" ry="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(15)"/>
      <ellipse cx="0" cy="-40" rx="12" ry="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(45)"/>
      <ellipse cx="0" cy="-40" rx="12" ry="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(75)"/>
      <ellipse cx="0" cy="-40" rx="12" ry="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(105)"/>
      <ellipse cx="0" cy="-40" rx="12" ry="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(135)"/>
      <ellipse cx="0" cy="-40" rx="12" ry="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(165)"/>
      <ellipse cx="0" cy="-40" rx="12" ry="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(195)"/>
      <ellipse cx="0" cy="-40" rx="12" ry="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(225)"/>
      <ellipse cx="0" cy="-40" rx="12" ry="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(255)"/>
      <ellipse cx="0" cy="-40" rx="12" ry="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(285)"/>
      <ellipse cx="0" cy="-40" rx="12" ry="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(315)"/>
      <ellipse cx="0" cy="-40" rx="12" ry="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(345)"/>
    </g>
    <!-- Center circles -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="5" fill="url(#goldGrad)"/>
    <!-- Diamond accents -->
    <g opacity="0.7">
      <polygon points="0,-92 4,-85 0,-78 -4,-85" fill="url(#goldGrad)" transform="rotate(0)"/>
      <polygon points="0,-92 4,-85 0,-78 -4,-85" fill="url(#goldGrad)" transform="rotate(45)"/>
      <polygon points="0,-92 4,-85 0,-78 -4,-85" fill="url(#goldGrad)" transform="rotate(90)"/>
      <polygon points="0,-92 4,-85 0,-78 -4,-85" fill="url(#goldGrad)" transform="rotate(135)"/>
      <polygon points="0,-92 4,-85 0,-78 -4,-85" fill="url(#goldGrad)" transform="rotate(180)"/>
      <polygon points="0,-92 4,-85 0,-78 -4,-85" fill="url(#goldGrad)" transform="rotate(225)"/>
      <polygon points="0,-92 4,-85 0,-78 -4,-85" fill="url(#goldGrad)" transform="rotate(270)"/>
      <polygon points="0,-92 4,-85 0,-78 -4,-85" fill="url(#goldGrad)" transform="rotate(315)"/>
    </g>
  </g>
</svg>
