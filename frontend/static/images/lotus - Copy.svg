<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="lotusGold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8860A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F5A623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g transform="translate(50,55)">
    <!-- Back petals -->
    <ellipse cx="-20" cy="-15" rx="10" ry="25" fill="none" stroke="url(#lotusGold)" stroke-width="1.5" transform="rotate(-30,-20,-15)" opacity="0.6"/>
    <ellipse cx="20" cy="-15" rx="10" ry="25" fill="none" stroke="url(#lotusGold)" stroke-width="1.5" transform="rotate(30,20,-15)" opacity="0.6"/>
    <!-- Middle petals -->
    <ellipse cx="-12" cy="-10" rx="9" ry="28" fill="none" stroke="url(#lotusGold)" stroke-width="1.5" transform="rotate(-15,-12,-10)" opacity="0.8"/>
    <ellipse cx="12" cy="-10" rx="9" ry="28" fill="none" stroke="url(#lotusGold)" stroke-width="1.5" transform="rotate(15,12,-10)" opacity="0.8"/>
    <!-- Front center petal -->
    <ellipse cx="0" cy="-8" rx="8" ry="30" fill="none" stroke="url(#lotusGold)" stroke-width="2"/>
    <!-- Base -->
    <path d="M-25,5 Q-15,-2 0,0 Q15,-2 25,5 Q15,12 0,10 Q-15,12 -25,5Z" fill="none" stroke="url(#lotusGold)" stroke-width="1.5"/>
    <!-- Center dot -->
    <circle cx="0" cy="-5" r="3" fill="url(#lotusGold)" opacity="0.8"/>
  </g>
</svg>
