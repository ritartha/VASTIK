{% extends "base.html" %}
{% load static %}

{% block title %}Gallery — VASTIK{% endblock %}

{% block content %}

<!-- ============================================================
     PAGE HEADER
     ============================================================ -->
<section class="page-header">
    <div class="page-header-particles" id="pageHeaderParticles"></div>
    <div class="container">
        <div class="page-header-content fade-in">
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="{% url 'home' %}">Home</a>
                <span class="breadcrumb-sep"><i class="fas fa-chevron-right"></i></span>
                <span>Gallery</span>
            </nav>
            <h1>Gallery</h1>
            <div class="mandala-divider">
                <img src="{% static 'images/lotus.svg' %}" alt="">
            </div>
            <p>A showcase of our finest creations and in-world builds</p>
        </div>
    </div>
</section>

<!-- ============================================================
     GALLERY SECTION
     ============================================================ -->
<section class="section gallery" id="gallery">
    <div class="container">
        <!-- Gallery Grid (populated by JS) -->
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>
</section>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <div class="lightbox-content">
        <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close lightbox">&times;</button>
        <button class="lightbox-nav lightbox-prev" onclick="navigateLightbox(-1)" aria-label="Previous image">
            <i class="fas fa-chevron-left"></i>
        </button>
        <img id="lightboxImage" src="" alt="Gallery Image">
        <button class="lightbox-nav lightbox-next" onclick="navigateLightbox(1)" aria-label="Next image">
            <i class="fas fa-chevron-right"></i>
        </button>
        <p class="lightbox-title" id="lightboxTitle"></p>
    </div>
</div>

{% endblock %}
