{% extends "base.html" %}
{% load static %}

{% block title %}Marketplace — VASTIK{% endblock %}

{% block content %}

<!-- ============================================================
     PAGE HEADER
     ============================================================ -->
<section class="page-header">
    <div class="page-header-particles" id="pageHeaderParticles"></div>
    <div class="container">
        <div class="page-header-content fade-in">
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="{% url 'home' %}">Home</a>
                <span class="breadcrumb-sep"><i class="fas fa-chevron-right"></i></span>
                <span>Marketplace</span>
            </nav>
            <h1>Marketplace</h1>
            <div class="mandala-divider">
                <img src="{% static 'images/lotus.svg' %}" alt="">
            </div>
            <p>Explore our collection of premium Indian-themed virtual goods</p>
        </div>
    </div>
</section>

<!-- ============================================================
     STORE SECTION
     ============================================================ -->
<section class="section store" id="store">
    <div class="container">
        <!-- Category Filter Tabs -->
        <div class="category-tabs fade-in" id="categoryTabs">
            <button class="category-tab active" data-category="" onclick="filterCategory('', this)">All</button>
            <button class="category-tab" data-category="Mesh" onclick="filterCategory('Mesh', this)">Mesh</button>
            <button class="category-tab" data-category="Script" onclick="filterCategory('Script', this)">Scripts</button>
            <button class="category-tab" data-category="Texture" onclick="filterCategory('Texture', this)">Textures</button>
        </div>

        <!-- Loading Spinner -->
        <div class="products-loading" id="productsLoading">
            <div class="spinner"></div>
            <p>Loading products...</p>
        </div>

        <!-- Products Grid (populated by JS) -->
        <div class="products-grid" id="productsGrid"></div>
    </div>
</section>

{% endblock %}
